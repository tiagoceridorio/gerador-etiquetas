<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Cartões - Produtos</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lora:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Berkshire+Swash&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', serif;
      background: #f5f0e8;
      color: #3a2e1f;
      min-height: 100vh;
    }

    /* ========== PAINEL DE CONTROLE ========== */
    .controls {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .controls h1 {
      font-family: 'Playfair Display', serif;
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
      color: #5a3e28;
    }

    .controls .subtitle {
      text-align: center;
      font-style: italic;
      color: #8a7560;
      margin-bottom: 30px;
    }

    .form-section {
      background: #fff;
      border: 1px solid #d4c5a9;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .form-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #5a3e28;
      border-bottom: 1px solid #e8dcc8;
      padding-bottom: 8px;
    }

    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 180px;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #6b5a45;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 8px 12px;
      border: 1px solid #d4c5a9;
      border-radius: 4px;
      font-family: 'Lora', serif;
      font-size: 0.9rem;
      background: #fdfbf7;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group input[type="file"] {
      padding: 6px;
      font-size: 0.8rem;
    }

    .image-preview {
      margin-top: 6px;
      max-width: 120px;
      max-height: 80px;
      border-radius: 4px;
      border: 1px solid #d4c5a9;
      display: none;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .preset-btn {
      padding: 10px 14px;
      border: 2px solid #d4c5a9;
      border-radius: 6px;
      background: #fdfbf7;
      cursor: pointer;
      font-family: 'Lora', serif;
      font-size: 0.85rem;
      text-align: left;
      transition: all 0.2s;
    }

    .preset-btn:hover {
      border-color: #8a6d4b;
      background: #f5edd8;
    }

    .preset-btn .preset-name {
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      display: block;
      margin-bottom: 2px;
    }

    .preset-btn .preset-desc {
      color: #8a7560;
      font-size: 0.8rem;
    }

    .qty-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .qty-row label { font-weight: 700; color: #6b5a45; font-size: 0.85rem; }

    .qty-input {
      width: 60px;
      padding: 6px 8px;
      border: 1px solid #d4c5a9;
      border-radius: 4px;
      font-family: 'Lora', serif;
      text-align: center;
    }

    .added-cards { margin-top: 16px; }

    .added-card-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #f9f4ea;
      border: 1px solid #e8dcc8;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .added-card-item .info { font-size: 0.9rem; }
    .added-card-item .info strong { font-family: 'Playfair Display', serif; }

    .btn-remove {
      background: #c0392b; color: #fff; border: none;
      border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 0.8rem;
    }
    .btn-remove:hover { background: #96281b; }

    .actions {
      display: flex; gap: 12px; justify-content: center;
      margin-top: 20px; flex-wrap: wrap;
    }

    .btn {
      padding: 12px 28px; border: none; border-radius: 6px;
      font-family: 'Playfair Display', serif; font-size: 1rem;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: #5a3e28; color: #fff; }
    .btn-primary:hover { background: #7a5838; }
    .btn-secondary { background: #d4c5a9; color: #3a2e1f; }
    .btn-secondary:hover { background: #c4b599; }
    .btn-add { background: #2e7d32; color: #fff; }
    .btn-add:hover { background: #1b5e20; }

    .checkbox-row {
      display: flex; align-items: center; gap: 8px; margin-top: 8px;
    }
    .checkbox-row input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: #5a3e28;
    }
    .checkbox-row label {
      font-size: 0.85rem; color: #6b5a45; font-weight: 400;
    }

    .banner-color-input {
      width: 40px; height: 28px; border: 1px solid #d4c5a9;
      border-radius: 4px; cursor: pointer; padding: 2px;
    }

    /* ========== IMPRESSÃO ========== */
    .print-area { display: none; }

    /* ========== CARTÃO ========== */
    .card-page {
      width: 210mm;
      height: 297mm;
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(3, 63mm);
      grid-template-rows: repeat(3, 92mm);
      justify-content: center;
      align-content: center;
      page-break-after: always;
      background: #fff;
    }

    .card-placeholder {
      width: 63mm;
      height: 92mm;
    }

    /* Marcas de corte */
    .crop-marks {
      position: absolute;
      top: 0; left: 0;
      width: 210mm;
      height: 297mm;
      pointer-events: none;
      z-index: 10;
    }

    .crop-mark {
      position: absolute;
      background: #000;
    }

    .crop-mark-h {
      width: 5mm;
      height: 0.2mm;
    }

    .crop-mark-v {
      width: 0.2mm;
      height: 5mm;
    }

    .card {
      width: 63mm;
      height: 92mm;
      position: relative;
      overflow: hidden;
      background: #fffcf5;
      display: flex;
      flex-direction: column;
      border-radius: 6px;
    }

    /* Borda externa vintage */
    .card-border-outer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border: 3px solid #9a7a48;
      border-radius: 6px;
      pointer-events: none;
      z-index: 2;
      /* Sombra para dar profundidade */
      box-shadow: inset 0 0 3px rgba(140, 100, 40, 0.15);
    }

    /* Borda interna decorativa */
    .card-border-inner {
      position: absolute;
      top: 5px; left: 5px; right: 5px; bottom: 5px;
      border: 1.5px solid #c4a96a;
      border-radius: 3px;
      pointer-events: none;
      z-index: 2;
    }

    /* Cantos decorativos */
    .corner {
      position: absolute;
      width: 30px;
      height: 30px;
      z-index: 3;
      pointer-events: none;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner-tl { top: 3px; left: 3px; }
    .corner-tr { top: 3px; right: 3px; transform: scaleX(-1); }
    .corner-bl { bottom: 3px; left: 3px; transform: scaleY(-1); }
    .corner-br { bottom: 3px; right: 3px; transform: scale(-1, -1); }

    /* Furo */
    .hole {
      position: absolute;
      top: 7px;
      left: 50%;
      transform: translateX(-50%);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid #8a6d4b;
      background: #fff;
      z-index: 4;
    }

    /* Textura */
    .card-texture {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Envelhecimento nos cantos */
    .card-aging {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 0% 0%, rgba(160,120,60,0.13) 0%, transparent 35%),
        radial-gradient(ellipse at 100% 0%, rgba(160,120,60,0.10) 0%, transparent 35%),
        radial-gradient(ellipse at 0% 100%, rgba(160,120,60,0.13) 0%, transparent 35%),
        radial-gradient(ellipse at 100% 100%, rgba(160,120,60,0.10) 0%, transparent 35%),
        radial-gradient(ellipse at 50% 100%, rgba(160,120,60,0.06) 0%, transparent 30%);
      pointer-events: none;
      z-index: 1;
      border-radius: 6px;
    }

    /* === FRENTE === */
    .card-front .card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 10px 0;
      position: relative;
      z-index: 2;
    }

    .card-front .product-type-name {
      font-family: 'Great Vibes', cursive;
      font-size: 38px;
      font-weight: 400;
      text-align: center;
      line-height: 0.92;
      color: #1a1408;
      margin-top: 0;
    }

    .card-front .ruled-lines {
      width: 74%;
      margin: 7px auto 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-front .ruled-line {
      width: 100%;
      height: 0;
      border-top: 1px solid #1a1408;
    }

    .card-front .product-desc {
      font-family: 'Lora', serif;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      color: #1a1408;
      margin: 1px 0;
    }

    .card-front .desc-lines {
      width: 60%;
      margin: 4px auto 2px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-front .desc-line {
      width: 100%;
      height: 0;
      border-top: 1px solid #999;
    }

    /* Imagem */
    .card-front .illustration-area {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px 12px;
      min-height: 70px;
      overflow: hidden;
    }

    .card-front .illustration-area img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .card-front .illustration-area .emoji-illust {
      font-size: 72px;
      line-height: 1;
    }

    /* Datas */
    .card-front .dates {
      width: 100%;
      padding: 2px 14px 8px;
      position: relative;
      z-index: 2;
    }

    .card-front .date-row {
      display: flex;
      align-items: baseline;
      margin-bottom: 0px;
    }

    .card-front .date-label {
      font-family: 'Dancing Script', cursive;
      font-size: 14px;
      font-weight: 700;
      color: #3a2818;
      white-space: nowrap;
    }

    .card-front .date-value {
      font-family: 'Lora', serif;
      font-size: 11px;
      color: #3a2818;
      margin-left: 5px;
      letter-spacing: 0.8px;
      white-space: nowrap;
    }

    .card-front .date-underline {
      flex: 1;
      border-bottom: 1px solid #aaa;
      margin-left: 6px;
      margin-bottom: 2px;
    }

    /* Banner escuro */
    .banner-overlay {
      position: absolute;
      top: 14px; left: 5px; right: 5px;
      padding: 8px 10px 10px;
      z-index: 5;
      border-radius: 2px;
      text-align: center;
    }

    .banner-overlay .product-type-name {
      font-family: 'Great Vibes', cursive;
      font-size: 34px;
      font-weight: 400;
      text-align: center;
      line-height: 0.92;
      color: #f5edd8;
    }

    .banner-overlay .ruled-lines {
      width: 74%;
      margin: 6px auto 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .banner-overlay .ruled-line {
      border-color: rgba(245,237,216,0.35);
    }

    .banner-overlay .product-desc {
      font-family: 'Lora', serif;
      font-size: 10.5px;
      font-weight: 700;
      color: #f5edd8;
      text-align: center;
    }

    /* === VERSO === */
    .card-back .card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 14px 12px;
      position: relative;
      z-index: 2;
    }

    .card-back .uso-title {
      font-family: 'Great Vibes', cursive;
      font-size: 28px;
      color: #1a1408;
      margin-bottom: 12px;
      text-align: center;
    }

    .card-back .uso-text {
      font-family: 'Lora', serif;
      font-size: 13px;
      line-height: 1.55;
      color: #2a1f14;
      text-align: center;
    }

    /* ========== PREVIEW ========== */
    .preview-area {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .preview-area h2 {
      font-family: 'Playfair Display', serif;
      text-align: center;
      margin-bottom: 20px;
      color: #5a3e28;
    }

    .preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .preview-pair {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .preview-label {
      text-align: center;
      font-size: 0.7rem;
      color: #8a7560;
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-style: italic;
    }

    /* ========== PRINT ========== */
    @media print {
      body { background: #fff; margin: 0; padding: 0; }
      .controls, .preview-area, .actions { display: none !important; }
      .print-area { display: block !important; }
      .card-page { margin: 0; padding: 0; }
      @page { size: A4; margin: 0; }
    }
  </style>
</head>
<body>

<div class="controls">
  <h1>Gerador de Cartões</h1>
  <p class="subtitle">Crie etiquetas personalizadas para seus produtos artesanais</p>

  <div class="form-section">
    <h2>Produtos Cadastrados</h2>
    <div class="preset-grid" id="presetGrid"></div>
  </div>

  <div class="form-section">
    <h2>Personalizar Cartão</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Tipo de Produto</label>
        <select id="productType">
          <option value="Sal">Sal</option>
          <option value="Jelly">Jelly</option>
          <option value="Outro">Outro (personalizado)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nome do Produto</label>
        <input type="text" id="productName" placeholder="Ex: Estimulante">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Ingredientes / Descrição</label>
        <input type="text" id="productDesc" placeholder="Ex: Gengibre &amp; Canela">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Imagem Botânica (upload)</label>
        <input type="file" id="productImage" accept="image/*">
        <img id="imagePreview" class="image-preview" alt="preview">
      </div>
      <div class="form-group">
        <label>Ou emoji como ilustração</label>
        <input type="text" id="productEmoji" placeholder="Deixe vazio se usar imagem">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Data de Fabricação</label>
        <input type="date" id="fabricDate">
      </div>
      <div class="form-group">
        <label>Data de Validade</label>
        <input type="date" id="validDate">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Modo de Uso (verso)</label>
        <textarea id="usageText"></textarea>
      </div>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="hasBanner">
      <label for="hasBanner">Fundo escuro no título (estilo Sal Noturno)</label>
      <input type="color" id="bannerColor" class="banner-color-input" value="#3c2814" title="Cor do banner">
    </div>

    <div class="qty-row">
      <label>Quantidade:</label>
      <input type="number" class="qty-input" id="qty" value="1" min="1" max="50">
      <button class="btn btn-add" onclick="addCard()">Adicionar ao Lote</button>
    </div>
  </div>

  <div class="form-section">
    <h2>Lote de Impressão</h2>
    <div id="addedCards" class="added-cards">
      <div class="empty-state">Nenhum cartão adicionado ainda</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-secondary" onclick="clearAll()">Limpar Tudo</button>
    <button class="btn btn-primary" onclick="generatePreview()">Visualizar Cartões</button>
    <button class="btn btn-primary" onclick="printCards()">🖨️ Imprimir</button>
  </div>
</div>

<div class="preview-area" id="previewArea">
  <h2>Pré-visualização</h2>
  <div class="preview-grid" id="previewGrid"></div>
</div>

<div class="print-area" id="printArea"></div>

<script>
  // ============ DADOS ============
  const PRESETS = [
    { type: 'Sal', name: 'Estimulante', desc: 'Gengibre & Canela', emoji: '🫚🍂', usage: 'sal', banner: false },
    { type: 'Sal', name: 'Hidratante', desc: 'Aveia com Óleo de Coco', emoji: '🌾🥥', usage: 'sal', banner: false },
    { type: 'Sal', name: 'Calmante', desc: 'Melissa & Maracujá', emoji: '🌿🍈', usage: 'sal', banner: false },
    { type: 'Sal', name: 'Esfoliante', desc: 'Rosas & Alecrim', emoji: '🌹🌿', usage: 'sal', banner: false },
    { type: 'Sal', name: 'Relaxante', desc: 'Lavanda & Camomila', emoji: '🪻🌼', usage: 'sal', banner: false },
    { type: 'Sal', name: 'Noturno', desc: 'Erva-Doce & Camomila', emoji: '🌱🌼', usage: 'sal', banner: true, bannerColor: '#3c2814' },
    { type: 'Sal', name: 'Refrescante', desc: 'Hortelã & Eucalipto', emoji: '🍃🌿', usage: 'sal', banner: false },
    { type: 'Jelly', name: 'Calmante', desc: 'Lavanda', emoji: '🪻', usage: 'jelly', banner: false },
  ];

  const USAGE_TEXTS = {
    sal: 'Adicione todo o conteúdo da embalagem em 3 a 4 litros de água morna e misture até dissolver.\nMergulhe os pés e relaxe por 15 a 20 minutos.\nPara finalizar, retire os pés e seque bem.',
    jelly: 'Adicione todo o conteúdo da embalagem em 3 a 4 litros de água morna e misture até formar o gel.\nMergulhe os pés e relaxe por 15 a 20 minutos.\nPara finalizar, adicione o desativador e misture até que o gel retorne ao estado líquido, facilitando o descarte.',
  };

  let cardBatch = [];
  let currentImageDataURL = null;

  // ============ INIT ============
  function init() {
    const grid = document.getElementById('presetGrid');
    PRESETS.forEach((p, i) => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn';
      btn.innerHTML = '<span class="preset-name">' + esc(p.emoji + ' ' + p.type + ' ' + p.name) + '</span><span class="preset-desc">' + esc(p.desc) + '</span>';
      btn.addEventListener('click', () => loadPreset(i));
      grid.appendChild(btn);
    });

    const today = new Date();
    document.getElementById('fabricDate').value = dateToInput(today);
    const nextYear = new Date(today);
    nextYear.setFullYear(nextYear.getFullYear() + 1);
    document.getElementById('validDate').value = dateToInput(nextYear);
    document.getElementById('usageText').value = USAGE_TEXTS.sal;

    document.getElementById('productType').addEventListener('change', function() {
      if (this.value !== 'Outro') {
        document.getElementById('usageText').value = USAGE_TEXTS[this.value === 'Jelly' ? 'jelly' : 'sal'];
      }
    });

    document.getElementById('productImage').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          currentImageDataURL = ev.target.result;
          const preview = document.getElementById('imagePreview');
          preview.src = currentImageDataURL;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });
  }

  function dateToInput(d) { return d.toISOString().split('T')[0]; }

  function formatDate(dateStr) {
    if (!dateStr) return '__/__/__';
    const p = dateStr.split('-');
    return p[2] + '/ ' + p[1] + '/ ' + p[0].slice(2);
  }

  function loadPreset(i) {
    const p = PRESETS[i];
    document.getElementById('productType').value = p.type;
    document.getElementById('productName').value = p.name;
    document.getElementById('productDesc').value = p.desc;
    document.getElementById('productEmoji').value = p.emoji;
    document.getElementById('usageText').value = USAGE_TEXTS[p.usage];
    document.getElementById('hasBanner').checked = !!p.banner;
    if (p.bannerColor) document.getElementById('bannerColor').value = p.bannerColor;
    currentImageDataURL = null;
    document.getElementById('productImage').value = '';
    document.getElementById('imagePreview').style.display = 'none';
  }

  // ============ LOTE ============
  function addCard() {
    const type = document.getElementById('productType').value;
    const name = document.getElementById('productName').value.trim();
    const desc = document.getElementById('productDesc').value.trim();
    const emoji = document.getElementById('productEmoji').value.trim();
    const fabricDate = document.getElementById('fabricDate').value;
    const validDate = document.getElementById('validDate').value;
    const usageText = document.getElementById('usageText').value.trim();
    const qty = parseInt(document.getElementById('qty').value) || 1;
    const hasBanner = document.getElementById('hasBanner').checked;
    const bannerColor = document.getElementById('bannerColor').value;
    const imageDataURL = currentImageDataURL;

    if (!name) { alert('Preencha o nome do produto.'); return; }
    cardBatch.push({ type, name, desc, emoji, fabricDate, validDate, usageText, qty, hasBanner, bannerColor, imageDataURL });
    renderBatch();

    currentImageDataURL = null;
    document.getElementById('productImage').value = '';
    document.getElementById('imagePreview').style.display = 'none';
  }

  function removeCard(i) { cardBatch.splice(i, 1); renderBatch(); }

  function clearAll() {
    cardBatch = [];
    renderBatch();
    document.getElementById('previewGrid').innerHTML = '';
  }

  function renderBatch() {
    const el = document.getElementById('addedCards');
    if (!cardBatch.length) {
      el.innerHTML = '<div class="empty-state">Nenhum cartão adicionado ainda</div>';
      return;
    }
    el.innerHTML = cardBatch.map((c, i) =>
      '<div class="added-card-item"><div class="info">' +
      '<strong>' + esc(c.type + ' ' + c.name) + '</strong> — ' + esc(c.desc) +
      (c.hasBanner ? ' <small style="color:#8a6d4b">[banner]</small>' : '') +
      (c.imageDataURL ? ' <small style="color:#2e7d32">[imagem]</small>' : '') +
      '<br><small>Fab: ' + esc(formatDate(c.fabricDate)) + ' | Val: ' + esc(formatDate(c.validDate)) + ' | Qtd: ' + c.qty + '</small>' +
      '</div><button class="btn-remove" onclick="removeCard(' + i + ')">Remover</button></div>'
    ).join('');
  }

  // ============ ESCAPE ============
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  // ============ ESTRUTURA DO CARTÃO ============
  function cornerSVG() {
    return '<svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M3 27 C3 14, 6 8, 12 5 C16 3, 22 3, 27 3" stroke="#b8963e" stroke-width="1.8" fill="none"/>' +
      '<path d="M3 22 C3 12, 6 7, 11 5 C14 3.5, 19 3, 22 3" stroke="#c4a96a" stroke-width="1" fill="none"/>' +
      '<path d="M6 27 C6 16, 8 10, 14 7 C17 5.5, 22 5, 27 5" stroke="#c4a96a" stroke-width="0.8" fill="none"/>' +
      '<circle cx="4" cy="26" r="1.2" fill="#b8963e" opacity="0.5"/>' +
      '<circle cx="26" cy="4" r="1.2" fill="#b8963e" opacity="0.5"/>' +
    '</svg>';
  }

  function cardShell() {
    return '<div class="card-texture"></div>' +
      '<div class="card-aging"></div>' +
      '<div class="card-border-outer"></div>' +
      '<div class="card-border-inner"></div>' +
      '<div class="hole"></div>' +
      '<div class="corner corner-tl">' + cornerSVG() + '</div>' +
      '<div class="corner corner-tr">' + cornerSVG() + '</div>' +
      '<div class="corner corner-bl">' + cornerSVG() + '</div>' +
      '<div class="corner corner-br">' + cornerSVG() + '</div>';
  }

  function ruledLines(count, color) {
    let html = '<div class="ruled-lines">';
    for (let i = 0; i < count; i++) {
      html += '<div class="ruled-line"' + (color ? ' style="border-color:' + color + '"' : '') + '></div>';
    }
    return html + '</div>';
  }

  function descLines(count) {
    let html = '<div class="desc-lines">';
    for (let i = 0; i < count; i++) html += '<div class="desc-line"></div>';
    return html + '</div>';
  }

  function illustration(c) {
    if (c.imageDataURL) return '<img src="' + c.imageDataURL + '" alt="ilustração">';
    if (c.emoji) return '<span class="emoji-illust">' + esc(c.emoji) + '</span>';
    return '';
  }

  // ============ FRENTE ============
  function buildFront(c) {
    let html = '<div class="card card-front">' + cardShell();

    if (c.hasBanner) {
      const bg = esc(c.bannerColor || '#3c2814');
      html += '<div class="banner-overlay" style="background:' + bg + 'e0;">' +
        '<div class="product-type-name">' + esc(c.type) + '<br>' + esc(c.name) + '</div>' +
        ruledLines(2, 'rgba(245,237,216,0.35)') +
        '<div class="product-desc">' + esc(c.desc) + '</div>' +
        '</div>' +
        '<div class="card-content" style="padding-top:85px;">' +
        descLines(2) +
        '<div class="illustration-area">' + illustration(c) + '</div>' +
        '</div>';
    } else {
      html += '<div class="card-content">' +
        '<div class="product-type-name">' + esc(c.type) + '<br>' + esc(c.name) + '</div>' +
        ruledLines(2) +
        '<div class="product-desc">' + esc(c.desc) + '</div>' +
        descLines(2) +
        '<div class="illustration-area">' + illustration(c) + '</div>' +
        '</div>';
    }

    html += '<div class="dates">' +
      '<div class="date-row"><span class="date-label">Fabricado:</span><span class="date-value">' + esc(formatDate(c.fabricDate)) + '</span><span class="date-underline"></span></div>' +
      '<div class="date-row"><span class="date-label">Validade:</span><span class="date-value">' + esc(formatDate(c.validDate)) + '</span><span class="date-underline"></span></div>' +
      '</div></div>';

    return html;
  }

  // ============ VERSO ============
  function buildBack(c) {
    const txt = esc(c.usageText).replace(/\n/g, '<br>');
    return '<div class="card card-back">' + cardShell() +
      '<div class="card-content">' +
      '<div class="uso-title">Modo de uso:</div>' +
      '<div class="uso-text">' + txt + '</div>' +
      '</div></div>';
  }

  // ============ PREVIEW ============
  function generatePreview() {
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = '';
    if (!cardBatch.length) {
      grid.innerHTML = '<div class="empty-state">Adicione cartões ao lote primeiro</div>';
      return;
    }

    cardBatch.forEach(c => {
      for (let i = 0; i < c.qty; i++) {
        const pair = document.createElement('div');
        pair.className = 'preview-pair';
        pair.innerHTML =
          '<div><div>' + buildFront(c) + '</div><div class="preview-label">Frente</div></div>' +
          '<div><div>' + buildBack(c) + '</div><div class="preview-label">Verso</div></div>';
        grid.appendChild(pair);
      }
    });

    document.getElementById('previewArea').scrollIntoView({ behavior: 'smooth' });
  }

  // ============ IMPRESSÃO ============
  function printCards() {
    if (!cardBatch.length) { alert('Adicione cartões ao lote primeiro.'); return; }

    const printArea = document.getElementById('printArea');
    printArea.innerHTML = '';

    const all = [];
    cardBatch.forEach(c => { for (let i = 0; i < c.qty; i++) all.push(c); });

    const PER_PAGE = 9;
    const COLS = 3;
    for (let i = 0; i < all.length; i += PER_PAGE) {
      const slice = all.slice(i, i + PER_PAGE);

      // Página de frente
      const fr = document.createElement('div');
      fr.className = 'card-page';
      fr.style.position = 'relative';
      slice.forEach(c => { fr.innerHTML += buildFront(c); });
      // Preencher células vazias para manter o grid
      for (let e = slice.length; e < PER_PAGE; e++) {
        fr.innerHTML += '<div class="card-placeholder"></div>';
      }
      printArea.appendChild(fr);

      // Página de verso (espelhada horizontalmente por linha)
      const bk = document.createElement('div');
      bk.className = 'card-page';
      bk.style.position = 'relative';
      for (let r = 0; r < PER_PAGE; r += COLS) {
        const row = slice.slice(r, r + COLS);
        const empties = COLS - row.length;
        const reversed = [...row].reverse();
        // Placeholders antes dos cartões invertidos (para alinhar à direita)
        for (let e = 0; e < empties; e++) {
          bk.innerHTML += '<div class="card-placeholder"></div>';
        }
        reversed.forEach(c => { bk.innerHTML += buildBack(c); });
      }
      // Preencher linhas vazias restantes
      const totalBack = bk.children.length;
      for (let e = totalBack; e < PER_PAGE; e++) {
        bk.innerHTML += '<div class="card-placeholder"></div>';
      }
      printArea.appendChild(bk);
    }

    setTimeout(() => window.print(), 300);
  }

  init();
</script>

</body>
</html>
